; PlatformIO - 메카넘 4모터 '명령형' 펌웨어 (Arduino Mega 2560 + MDD10A x2)
; PC(visualization/track_and_approach.py)가 시리얼로 속도명령을 보내 구동한다.
; baudrate 는 PC 측과 반드시 동일한 115200.
;
; ※ four_motor_test.ino (전진 전용 벤치 테스트)와 핀맵/기어비는 동일하되,
;   '명령 수신 + 메카넘 믹싱 + 가감속 + 안전(STOP/ESTOP/데드맨)'을 추가한 버전이다.

[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 115200

; 업로드/모니터 포트(이 PC 기준 Mega=COM3). 다른 PC면 장치관리자에서 확인 후 수정.
upload_port = COM3
monitor_port = COM3
