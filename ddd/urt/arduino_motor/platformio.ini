; PlatformIO project - 웹캠/LiDAR 주행제어용 모터 펌웨어
; 보드: Arduino Mega 2560
; 모터 드라이버: Cytron MDD10A (Dual Channel, Sign-Magnitude 모드)
;
; baudrate는 Python 측(모터2개_시리얼테스트.py)과 반드시 동일한 115200을 사용한다.

[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 115200

; Arduino Mega 연결 포트(장치관리자에서 확인). LiDAR 등 다른 시리얼과 혼동 방지로 고정.
upload_port = COM10
monitor_port = COM10
